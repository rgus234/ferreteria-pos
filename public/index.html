<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Ferretería Olímpico</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div id="login">

        <div class="login-box">

            <h1>🔐 Iniciar Sesión</h1>

            <input
                id="usuario"
                placeholder="Usuario"
            >

            <input
                id="password"
                type="password"
                placeholder="Contraseña"
            >

            <button onclick="iniciarSesion()">
                Entrar
            </button>

        </div>

    </div>

    <div
        id="sistema"
        style="display:none;"
    >

        <div class="layout">

            <aside class="sidebar">

                <h1>
                    🔨 FERRETERÍA OLÍMPICO
                </h1>

                <button onclick="mostrarInicio()">
                    🏠 Inicio / Dashboard
                </button>

                <button onclick="mostrarInicio()">
                    🛒 Punto de venta
                </button>

                <button onclick="mostrarInventario()">
                    📦 Inventario
                </button>

                <button onclick="mostrarInventarioBajo()">
                    🔴 Inventario bajo
                </button>

                <button onclick="mostrarGraficas()">
                    📊 Reportes / Ventas
                </button>

                <button>
                    👥 Clientes
                </button>

                <button>
                    🚚 Proveedores
                </button>

                <button onclick="cambiarModo()">
                    ⚙️ Configuración
                </button>

            </aside>

            <main class="contenido">

                <div id="pantallaInicio">

                    <div class="dashboard-top">

                        <div class="caja mini">

                            <h3>
                                Ventas del día
                            </h3>

                            <p>
                                $3,820
                            </p>

                        </div>

                        <div class="caja mini">

                            <h3>
                                Ventas del mes
                            </h3>

                            <p>
                                $45,230
                            </p>

                        </div>

                        <div class="caja mini">

                            <h3>
                                Transacciones
                            </h3>

                            <p>
                                32
                            </p>

                        </div>

                        <div class="caja mini">

                            <h3>
                                Productos
                            </h3>

                            <p id="totalProductos">
                                0
                            </p>

                        </div>

                    </div>

                    <input
                        id="busqueda"
                        type="text"
                        placeholder="🔎 Buscar por nombre o código de barras"
                        oninput="buscarProductos()"
                        onkeydown="buscarCodigoEnter(event)"
                    >

                    <div class="formulario-producto">

                        <input
                            id="nuevoNombre"
                            placeholder="Nombre del producto"
                        >

                        <input
                            id="nuevoPrecio"
                            type="number"
                            placeholder="Precio"
                        >

                        <input
                            id="nuevoStock"
                            type="number"
                            placeholder="Stock"
                        >

                        <input
                            id="nuevoCodigo"
                            placeholder="Código de barras"
                        >

                        <button onclick="agregarProductoNuevo()">
                            ➕ Agregar producto
                        </button>

                    </div>

                    <div class="productos">

                        <div id="productos"></div>

                        <div class="lado">

                            <div class="caja">

                                <h2>
                                    🛒 Carrito
                                </h2>

                                <div id="carrito"></div>

                            </div>

                            <div class="caja">

                                <h2>
                                    📜 Historial
                                </h2>

                                <div id="historial"></div>

                            </div>

                        </div>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
