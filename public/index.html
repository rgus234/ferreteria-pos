<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ferretería Olímpico</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div id="login">

        <div class="login-box">

            <h1>🔐 Iniciar Sesión</h1>

            <input id="usuario" placeholder="Usuario">

            <input
                id="password"
                placeholder="Contraseña"
                type="password"
            >

            <button onclick="iniciarSesion()">
                Entrar
            </button>

        </div>

    </div>

    <div
        id="sistema"
        style="display:none;"
    >

        <div class="layout">

            <aside class="sidebar">

                <h1>
                    🔨 FERRETERÍA OLÍMPICO
                </h1>

                <button onclick="mostrarInicio()">
                    🏠 Inicio / Dashboard
                </button>

                <button onclick="mostrarPuntoVenta()">
                    🛒 Punto de venta
                </button>

                <button onclick="mostrarInventario()">
                    📦 Inventario
                </button>

                <button onclick="mostrarInventarioBajo()">
                    🔴 Inventario bajo
                </button>

                <button onclick="mostrarGraficas()">
                    📊 Reportes / Ventas
                </button>

                <button>
                    👥 Clientes
                </button>

                <button>
                    🚚 Proveedores
                </button>

                <button onclick="cambiarModo()">
                    ⚙️ Configuración
                </button>

            </aside>

            <main class="contenido">

                <!-- DASHBOARD -->

                <div id="pantallaInicio">

                    <div class="dashboard-top">

                        <div class="caja mini">

                            <h3>📦 Productos</h3>

                            <p id="totalProductos">
                                0
                            </p>

                        </div>

                        <div class="caja mini">

                            <h3>🔴 Inventario bajo</h3>

                            <p id="totalBajos">
                                0
                            </p>

                        </div>

                        <div class="caja mini">

                            <h3>🕒 Últimas ventas</h3>

                            <p id="conteoVentas">
                                0
                            </p>

                        </div>

                        <div class="caja mini">

                            <h3>📋 Pendientes</h3>

                            <p>0</p>

                        </div>

                    </div>

                    <div class="caja">

                        <h2>
                            🔴 Alertas de inventario
                        </h2>

                        <div id="inventarioBajo"></div>

                    </div>

                    <div class="caja">

                        <h2>
                            🕒 Últimas ventas
                        </h2>

                        <div id="ultimasVentas"></div>

                    </div>

                </div>

                <!-- PUNTO DE VENTA -->

                <div
                    id="pantallaPuntoVenta"
                    style="display:none;"
                >

                    <input
                        id="busqueda"
                        type="text"
                        placeholder="🔎 Buscar por nombre o código de barras"
                        oninput="buscarProductos()"
                        onkeydown="buscarCodigoEnter(event)"
                    >

                    

                    <div class="productos">

                        <div id="productos"></div>

                        <div class="lado">

                            <div class="caja">

                                <h2>🛒 Carrito</h2>

                                <div id="carrito"></div>

                            </div>

                            <div class="caja">

                                <h2>📜 Historial</h2>

                                <div id="historial"></div>

                            </div>

                        </div>

                    </div>

                </div>

<div
    id="pantallaInventario"
    style="display:none;"
>

    <div class="caja">

        <div class="inventario-top">

            <input
                id="buscarInventario"
                type="text"
                placeholder="🔎 Buscar producto..."
                oninput="buscarInventario()"
            >
<button class="btn-agregar" onclick="mostrarFormularioAgregar()">
  + Agregar producto
</button>
        </div>

        <table class="tabla-inventario">

            <thead>

                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody id="tablaInventario">

            </tbody>

        </table>
<div
    id="modalAgregar"
    class="modal-overlay"
    style="display:none;"
>

    <div class="modal-producto">

        <div class="modal-header">

            <h2>➕ Nuevo producto</h2>

            <button onclick="cerrarFormularioAgregar()">
                ✕
            </button>

        </div>

        <div class="formulario-producto">

            <input
                id="nuevoCodigo"
                placeholder="📷 Código de barras"
            >

            <input
                id="nuevoNombre"
                placeholder="Nombre del producto"
            >
<input
  id="precioDistribuidor"
  type="number"
  placeholder="💲 Precio distribuidor"
/>

<input
  id="precioMayoreo"
  type="number"
  placeholder="💲 Precio medio mayoreo"
/>
            <input
                id="nuevoPrecio"
                type="number"
                placeholder="Precio público"
            >

            <input
                id="nuevoStock"
                type="number"
                placeholder="Stock actual"
            >

            <input
                id="stockMinimo"
                type="number"
                value="3"
                placeholder="Stock mínimo"
            >
<select id="altaRotacion">

    <option value="">
        🔥 ¿Se vende rápido?
    </option>

    <option value="si">
        Sí
    </option>

    <option value="no">
        No
    </option>

</select>
        </div>

        <div class="modal-botones">

            <button onclick="cerrarFormularioAgregar()">
                Cancelar
            </button>

            <button onclick="agregarProductoNuevo()">
                Guardar producto
            </button>

        </div>

    </div>

</div>
    </div>
</div>
</main>
</div>
</div>
<script src="app.js"></script>

</body>
</html>
