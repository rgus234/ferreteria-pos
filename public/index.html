<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ferretería Olímpico</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div id="login">

        <div class="login-box">

            <h1>🔐 Iniciar Sesión</h1>

            <input id="usuario" placeholder="Usuario">

            <input
                id="password"
                type="password"
                placeholder="Contraseña"
            >

            <button onclick="iniciarSesion()">
                Entrar
            </button>

        </div>

    </div>



    <div
        id="sistema"
        style="display:none;"
    >

        <div class="layout">

            <aside class="sidebar">

                <h1>🔨 Olímpico</h1>

                <button onclick="mostrarInicio()">🏠 Inicio</button>

                <button onclick="mostrarInventario()">📦 Inventario</button>

                <button onclick="mostrarInventarioBajo()">🔴 Inventario bajo</button>

                <button onclick="mostrarGraficas()">📊 Reportes</button>

                <button onclick="cambiarModo()">🌙 Modo oscuro</button>

            </aside>

            <main class="contenido">

                <div id="pantallaInicio">

<input
    id="busqueda"
    type="text"
    placeholder="🔎 Buscar por nombre o código"
    oninput="buscarProductos()"
>
                    <div class="productos">

                        <div id="productos"></div>

                        <div class="lado">

                            <div class="caja">

                                <h2>🛒 Carrito</h2>

                                <div id="carrito"></div>

                            </div>

                            <div class="caja">

                                <h2>📜 Historial</h2>

                                <div id="historial"></div>

                            </div>

                        </div>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
