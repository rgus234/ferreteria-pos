services:
  - type: web
    name: nexo-pos
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Nexo POS
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 1.0.1
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BASICO
        sync: false
      - key: STRIPE_PRICE_PLUS
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
