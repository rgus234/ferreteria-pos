services:
  - type: web
    name: nexo-pos
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Nexo POS
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 1.0.1
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_KEY
        sync: false
